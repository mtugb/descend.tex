# Ensure not to use double quartation.
# pattern and escape requires escapement

# Math---------------------------------------
[frac]
## escapement(for Regex) required
pattern = 'frac'
type = 'Template'
template = '\frac{$0}{$1}'
args_count = 2
## escapement(for Regex) required
alias = ["f"]
completion_label = 'frac'
parent_requirement = 'math_env'

[mat]
pattern = 'mat'
type = 'Environment'
env_name = 'bmatrix'
alias = ['m']
row_separator = '\\'
col_separator = '&'
completion_label = 'mat'
completion_template = "mat\n    $1 $2\n    $3 $4"
parent_requirement = 'math_env'

[vmat]
pattern = '\|mat\|'
type = "Environment"
env_name = "vmatrix"
alias = ['\|m\|']
row_separator = '\\'
col_separator = '&'
completion_label = '|mat|'
completion_template = "|mat|\n    $1 $2\n    $3 $4"
parent_requirement = 'math_env'

[tmat]
pattern = 'mat\^t'
type = 'Environment'
env_name = 'bmatrix'
alias = ['m\^t']
row_separator = '\\'
col_separator = '&'
output_suffix = '^{\top}'
completion_label = 'mat^t'
completion_template = "mat^t\n    $1 $2\n    $3 $4"
parent_requirement = 'math_env'

[lim]
pattern = 'lim'
type = 'Template'
template = '\lim_{$0 \to $1} $2'
args_count = 2
completion_label = 'lim'
parent_requirement = 'math_env'

[integral]
pattern = 'int'
type = 'Template'
template = '\int_{$0}^{$1} $2 \, d$3'
args_count = 4
alias = ['integral']
completion_label = 'int'
parent_requirement = 'math_env'

[sum]
pattern = 'sum'
type = 'Template'
template = '\sum_{$0}^{$1} $2'
args_count = 3
completion_label = 'sum'
parent_requirement = 'math_env'

[prod]
pattern = 'prod'
type = 'Template'
template = '\prod_{$0}^{$1} $2'
args_count = 3
completion_label = 'prod'
parent_requirement = 'math_env'

[sqrt]
pattern = 'sqrt'
type = 'Template'
template = '\sqrt{$0}'
args_count = 1
completion_label = 'sqrt'
parent_requirement = 'math_env'

[nsqrt]
pattern = 'nsqrt'
type = 'Template'
template = '\sqrt[$0]{$1}'
args_count = 2
completion_label = 'nsqrt'
parent_requirement = 'math_env'

[abs]
pattern = 'abs'
type = 'Template'
template = '\left|$0\right|'
args_count = 1
completion_label = 'abs'
parent_requirement = 'math_env'

[norm]
pattern = 'norm'
type = 'Template'
template = '\left\|$0\right\|'
args_count = 1
completion_label = 'norm'
parent_requirement = 'math_env'

[ceil]
pattern = 'ceil'
type = 'Template'
template = '\left\lceil$0\right\rceil'
args_count = 1
completion_label = 'ceil'
parent_requirement = 'math_env'

[floor]
pattern = 'floor'
type = 'Template'
template = '\left\lfloor$0\right\rfloor'
args_count = 1
completion_label = 'floor'
parent_requirement = 'math_env'

# Document
[h1]
pattern = '^# (.+)$'
type = "Regex"
template = '\section{$1}'

[h2]
pattern = '^## (.+)$'
type = "Regex"
template = '\subsection{$1}'

[h3]
pattern = '^### (.+)$'
type = "Regex"
template = '\subsubsection{$1}'

[itemize]
pattern = "itemize"
type = "Environment"
env_name = "itemize"
row_separator = '\item '
completion_label = 'itemize'
completion_template = "itemize\n    $1\n    $2"

# Structure
[inline_math]
pattern = '\$'
type = "Wrap"
prefix = '$'
suffix = '$'
completion_label = '$'
completion_template = "$\n    $1"
provides = 'math_env'

[display_math]
pattern = '\$\$'
type = "Wrap"
prefix = '\begin{align*}'
suffix = '\end{align*}'
completion_label = '$$'
completion_template = "$$\n    $1"
provides = 'math_env'

# join vertical elem in horizontal direction.
[flatten]
pattern = '\|\|'
type = "Wrap"
prefix = ''
suffix = ''
completion_label = '||'
completion_template = "||\n    $1"
